<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OG Image — Direction A: Hero</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f2f2f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .og {
    width: 1200px;
    height: 630px;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', -apple-system, sans-serif;
    border-radius: 0;
    background: #1c1c1e;
  }

  /* Background image layer */
  .bg-image {
    position: absolute;
    inset: 0;
    background: url('../public/images/hero-bg.jpeg') center center / cover no-repeat;
    transform: scaleY(-1) rotate(180deg);
    opacity: 0.55;
  }

  /* Gradient overlay for readability */
  .bg-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(28,28,30,0.92) 0%, rgba(28,28,30,0.6) 50%, rgba(28,28,30,0.3) 100%);
  }

  /* Content */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
    padding: 64px 72px;
  }

  /* Title card — mimics the Hero H1 style */
  .title-card {
    display: inline-block;
    align-self: flex-start;
    background: #ffffff;
    border: 3px solid #1c1c1e;
    border-radius: 20px;
    box-shadow: 5px 5px 0px 0px #1c1c1e;
    padding: 12px 28px 18px;
    margin-bottom: 28px;
  }

  .title-card h1 {
    font-size: 52px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -1.4px;
    color: #1c1c1e;
  }

  /* Subtitle */
  .subtitle {
    max-width: 520px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 28px;
  }

  .subtitle p {
    font-size: 19px;
    line-height: 1.5;
    letter-spacing: -0.5px;
    color: #1c1c1e;
  }

  /* Bottom row: CTA pill + URL */
  .bottom-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .cta-pill {
    background: #F2CC0D;
    border-radius: 10px;
    padding: 10px 24px;
    font-size: 16px;
    font-weight: 600;
    color: #0a0a0a;
    letter-spacing: -0.2px;
  }

  .url {
    font-size: 16px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    letter-spacing: -0.2px;
  }

  /* Avatar cluster bottom-right */
  .avatar-area {
    position: absolute;
    bottom: 48px;
    right: 64px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }

  .avatar-circle {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.3);
    background: url('../public/images/josh-fear.jpg') center center / cover no-repeat;
  }

  .avatar-name {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    text-align: right;
  }

  /* Trust logos bottom-right */
  .trust-strip {
    position: absolute;
    top: 48px;
    right: 64px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .trust-strip span {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .trust-logo {
    height: 28px;
    opacity: 0.35;
    filter: brightness(0) invert(1);
  }
</style>
</head>
<body>

<div class="og">
  <div class="bg-image"></div>
  <div class="bg-gradient"></div>

  <!-- Top-right trust logos -->
  <div class="trust-strip">
    <span>Trusted by</span>
    <img src="../public/images/trust-logos/xero.svg" class="trust-logo" alt="Xero">
    <img src="../public/images/trust-logos/logo4.svg" class="trust-logo" alt="Fisher & Paykel">
    <img src="../public/images/trust-logos/logo5.svg" class="trust-logo" alt="Vodafone">
    <img src="../public/images/trust-logos/logo6.svg" class="trust-logo" alt="Les Mills">
  </div>

  <div class="content">
    <div class="title-card">
      <h1>Think like a partner.<br>Execute fractionally.</h1>
    </div>

    <div class="subtitle">
      <p>I help early-stage teams make clear product design decisions and ship with momentum.</p>
    </div>

    <div class="bottom-row">
      <div class="cta-pill">Book a 15-min intro</div>
      <span class="url">bearliu.com</span>
    </div>
  </div>

  <!-- Client avatar -->
  <div class="avatar-area">
    <div class="avatar-circle"></div>
    <div class="avatar-name">"Seamless and painless"<br>— Josh Fear, MovesMethod</div>
  </div>
</div>

</body>
</html>
