<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OG Image — Direction B: Identity Card</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f2f2f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .og {
    width: 1200px;
    height: 630px;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', -apple-system, sans-serif;
    background: #ffffff;
    display: flex;
  }

  /* Left: photo panel */
  .photo-panel {
    width: 400px;
    height: 100%;
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
  }

  .photo-panel img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 30% 20%;
  }

  /* Gradient fade from photo to white */
  .photo-fade {
    position: absolute;
    top: 0;
    right: 0;
    width: 120px;
    height: 100%;
    background: linear-gradient(to right, transparent, #ffffff);
  }

  /* Right: content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 56px 64px 56px 32px;
  }

  /* Name */
  .name {
    font-size: 48px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -1.4px;
    color: #1c1c1e;
    margin-bottom: 8px;
  }

  /* Role — brown accent */
  .role {
    font-size: 22px;
    font-weight: 600;
    line-height: 1.4;
    letter-spacing: -0.6px;
    color: #A2845E;
    margin-bottom: 24px;
  }

  /* Divider */
  .divider {
    width: 48px;
    height: 4px;
    background: #F2CC0D;
    border-radius: 2px;
    margin-bottom: 24px;
  }

  /* Description */
  .desc {
    font-size: 18px;
    font-weight: 400;
    line-height: 1.6;
    letter-spacing: -0.4px;
    color: #4a4a4a;
    max-width: 460px;
    margin-bottom: 32px;
  }

  /* Credential badges */
  .badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 36px;
  }

  .badge {
    background: #A2845E;
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    color: #ffffff;
    white-space: nowrap;
  }

  /* Trust logos row */
  .trust-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .trust-label {
    font-size: 13px;
    font-weight: 600;
    color: #bebebe;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .trust-logo {
    height: 24px;
    opacity: 0.25;
    filter: grayscale(100%);
  }

  /* URL watermark bottom-right */
  .url {
    position: absolute;
    bottom: 28px;
    right: 40px;
    font-size: 14px;
    font-weight: 500;
    color: #bebebe;
    letter-spacing: -0.2px;
  }

  /* Subtle accent stripe at top */
  .top-stripe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(to right, #F2CC0D 0%, #F2CC0D 33%, #A2845E 33%, #A2845E 66%, #1c1c1e 66%, #1c1c1e 100%);
  }
</style>
</head>
<body>

<div class="og">
  <div class="top-stripe"></div>

  <!-- Left: portrait photo -->
  <div class="photo-panel">
    <img src="../public/images/hero-bg.jpeg" alt="Bear Liu">
    <div class="photo-fade"></div>
  </div>

  <!-- Right: identity info -->
  <div class="content">
    <h1 class="name">Bear Liu</h1>
    <p class="role">Fractional Design Partner</p>

    <div class="divider"></div>

    <p class="desc">
      I help early-stage teams make clear product design decisions and ship with momentum, without hiring a full-time designer.
    </p>

    <div class="badges">
      <span class="badge">Ex-Xero Product Designer</span>
      <span class="badge">UX New Zealand Speaker</span>
      <span class="badge">10+ Years in Product Design</span>
    </div>

    <div class="trust-row">
      <span class="trust-label">Trusted by</span>
      <img src="../public/images/trust-logos/xero.svg" class="trust-logo" alt="Xero">
      <img src="../public/images/trust-logos/logo4.svg" class="trust-logo" alt="Fisher & Paykel">
      <img src="../public/images/trust-logos/logo5.svg" class="trust-logo" alt="Vodafone">
      <img src="../public/images/trust-logos/logo6.svg" class="trust-logo" alt="Les Mills">
    </div>
  </div>

  <span class="url">bearliu.com</span>
</div>

</body>
</html>
